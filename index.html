<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="tab-container">
      <div class="tabs">
        <button class="tab-btn active" data-tab = "tab1">First Tab</button>
        <button class="tab-btn" data-tab="tab2">Second Tab</button>
        <button class="tab-btn" data-tab="tab3">Third Tab</button>
        <button class="tab-btn" data-tab="tab4">Fourth Tab</button>
      </div>
      <div class="tab-contents-container">
    <p class="tab-content active" id="tab1">This is the First tab </p>
    <p class="tab-content" id="tab2">This is the second tab </p>
    <p class="tab-content" id="tab3">This is the third tab</p>
    <p class="tab-content" id="tab4">This is the fourth tab</p>
    </div>
    </div>
  </main>



  <script src="script.js">

  </script>
</body>
</html>
